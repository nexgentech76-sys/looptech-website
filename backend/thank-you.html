<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | LoopTech Software Solutions</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#081c3a,#00c6ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.box{
    background:#fff;
    max-width:550px;
    width:100%;
    padding:50px 40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.2);
    animation:fadeIn .6s ease;
}

.icon{
    font-size:80px;
    color:#25d366;
    margin-bottom:20px;
}

h1{
    color:#081c3a;
    margin-bottom:15px;
    font-size:42px;
}

.message{
    font-size:18px;
    color:#555;
    line-height:1.7;
    margin-bottom:25px;
}

.info{
    background:#f4f8ff;
    padding:15px;
    border-radius:12px;
    margin-bottom:25px;
    color:#081c3a;
    font-weight:600;
}

.btn{
    display:inline-block;
    background:#ff6b00;
    color:#fff;
    text-decoration:none;
    padding:14px 35px;
    border-radius:40px;
    font-size:18px;
    font-weight:700;
    transition:.3s;
}

.btn:hover{
    background:#e65f00;
    transform:translateY(-2px);
}

.footer{
    margin-top:25px;
    font-size:14px;
    color:#777;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="box">

```
<div class="icon">✅</div>

<h1>Thank You!</h1>

<p class="message">
    Your demo request has been submitted successfully.
    Our LoopTech team will contact you shortly.
</p>

<div class="info">
    📞 +971 56 727 5589<br>
    📧 jcjlooptech@gmail.com
</div>

<a href="/" class="btn">Back To Home</a>

<div class="footer">
    © 2026 LoopTech Software Solutions. All Rights Reserved.
</div>
```

</div>

</body>
</html>
