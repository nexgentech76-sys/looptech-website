<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Thank You | LoopTech Software Solutions</title>
  <meta name="description" content="Thank you for contacting LoopTech Software Solutions. Our team will contact you shortly." />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      min-height:100vh;
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#081c3a,#00c6ff);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:#222;
    }

    .thank-you-box{
      background:#fff;
      max-width:550px;
      width:100%;
      padding:50px 40px;
      border-radius:25px;
      text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,.2);
    }

    .icon{
      width:90px;
      height:90px;
      margin:0 auto 20px;
      border-radius:50%;
      background:#25d366;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:48px;
      font-weight:700;
    }

    h1{
      color:#081c3a;
      margin-bottom:15px;
      font-size:42px;
    }

    .message{
      font-size:18px;
      color:#555;
      line-height:1.7;
      margin-bottom:25px;
    }

    .info{
      background:#f4f8ff;
      padding:18px;
      border-radius:12px;
      margin-bottom:25px;
      color:#081c3a;
      font-weight:600;
      line-height:1.8;
    }

    .info a{
      color:#081c3a;
      text-decoration:none;
    }

    .actions{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
    }

    .btn{
      display:inline-block;
      min-width:220px;
      color:#fff;
      text-decoration:none;
      padding:14px 30px;
      border-radius:40px;
      font-size:18px;
      font-weight:700;
      transition:.3s;
    }

    .btn:hover{
      transform:translateY(-2px);
      opacity:.9;
    }

    .home-btn{background:#ff6b00}
    .whatsapp-btn{background:#25d366}

    .footer{
      margin-top:25px;
      font-size:14px;
      color:#777;
      line-height:1.6;
    }

    @media(max-width:600px){
      .thank-you-box{
        padding:40px 25px;
      }

      h1{
        font-size:34px;
      }

      .message{
        font-size:16px;
      }

      .btn{
        width:100%;
        font-size:16px;
      }
    }
  </style>
</head>

<body>

  <main class="thank-you-box">
    <div class="icon">✓</div>

    <h1>Thank You!</h1>

    <p class="message">
      Your demo request has been submitted successfully.
      Our LoopTech team will contact you shortly.
    </p>

    <div class="info">
      📞 <a href="tel:+971567275589">+971 56 727 5589</a><br />
      📧 <a href="mailto:jcjlooptech@gmail.com">jcjlooptech@gmail.com</a><br />
      📍 Abu Dhabi, UAE
    </div>

    <div class="actions">
      <a href="index.html" class="btn home-btn">Back To Home</a>
      <a href="https://wa.me/971567275589" target="_blank" rel="noopener" class="btn whatsapp-btn">
        Chat on WhatsApp
      </a>
    </div>

    <div class="footer">
      © 2026 LoopTech Software Solutions. All Rights Reserved.
    </div>
  </main>

</body>
</html>
